# Plantilla de configuración NGINX para despliegue en Producción
# Ubicación típica: /etc/nginx/sites-available/blender-visualizer

server {
    listen 80;
    server_name tu-dominio.com; # Cambiar por tu dominio o IP pública

    # Aumentar el límite de subida para archivos .blend grandes
    client_max_body_size 200M;

    location / {
        proxy_pass http://localhost:3000; # Puerto por defecto de Next.js
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Aumentar timeouts por si la conversión en Blender tarda mucho
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }
}
