<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blender 3D Visualizer</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="./styles.css">

    <!-- Model Viewer -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Barra superior -->
        <header class="glass-header">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                    <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                    <line x1="12" y1="22.08" x2="12" y2="12"></line>
                </svg>
                <h1>3D Visor</h1>
            </div>
            <p class="subtitle">Sube modelos .glb/.gltf exportados de Blender</p>
        </header>

        <!-- Contenedor Principal -->
        <main class="main-content">
            
            <!-- Zona de Subida de Archivo -->
            <div id="drop-zone" class="glass-panel upload-section">
                <input type="file" id="file-input" accept=".glb,.gltf" hidden />
                <div class="upload-content">
                    <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    <h2>Selecciona un modelo 3D</h2>
                    <p>Arrastra tu archivo aquí o <span class="highlight">explora en tu dispositivo</span></p>
                    <span class="file-hint">Formatos soportados: .glb, .gltf</span>
                </div>
            </div>

            <!-- Visor 3D (Oculto inicialmente) -->
            <div id="viewer-container" class="glass-panel viewer-section hidden">
                <model-viewer 
                    id="model-viewer" 
                    alt="Modelo 3D subido por el usuario"
                    camera-controls 
                    auto-rotate
                    ar 
                    ar-modes="webxr scene-viewer quick-look"
                    shadow-intensity="1"
                    environment-image="neutral">
                    
                    <div class="progress-bar hide" slot="progress-bar">
                        <div class="update-bar"></div>
                    </div>
                    
                    <button slot="ar-button" id="ar-button">
                        Ver en tu espacio (AR)
                    </button>
                    
                </model-viewer>
                
                <div class="viewer-controls">
                    <button id="close-viewer" class="btn-secondary">Cerrar Visor</button>
                </div>
            </div>

        </main>
        
        <!-- Alertas -->
        <div id="toast" class="toast hidden"></div>
    </div>

    <!-- Logic -->
    <script type="module" src="./app.js"></script>
</body>
</html>
